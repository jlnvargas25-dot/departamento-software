# T041 — CI gate: adversarial suite blocks merge to main
#
# Constitution A5 + A12 CRITICA: any failure in adversarial tests
# prevents the PR from merging. No [skip-ci] workaround allowed.
#
# Pipeline:
#   1. unit tests (Vitest, no infra)
#   2. Supabase start → integration tests (RLS isolation — T040)
#   3. Next.js dev server → e2e adversarial suite (Playwright)
#
# Branch protection rule required (repo settings):
#   - "adversarial-gate" status check → required before merge
#   - "integration-rls" status check → required before merge

name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # These are test-safe values — real secrets injected via repo secrets
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_LOCAL_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_LOCAL_SERVICE_ROLE_KEY }}
  UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
  UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit tests — pure domain logic, no infra
  # ---------------------------------------------------------------------------
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ---------------------------------------------------------------------------
  # Job 2: Integration tests — RLS isolation (requires Supabase local)
  # CRITICA gate: A5 + A12 enforcement at DB layer
  # ---------------------------------------------------------------------------
  integration-rls:
    name: "CRITICA: RLS Isolation Tests (A5+A12)"
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local instance
        run: supabase start

      - name: Apply migrations
        run: supabase db push

      - name: Capture local Supabase keys
        run: |
          ANON_KEY=$(supabase status --output json | jq -r '.anon_key')
          SERVICE_KEY=$(supabase status --output json | jq -r '.service_role_key')
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_KEY" >> $GITHUB_ENV

      - name: Run RLS isolation integration tests
        run: npm run test:integration -- --reporter=verbose --project=rls
        # Non-zero exit code → job fails → PR blocked (A5+A12 CRITICA)

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # ---------------------------------------------------------------------------
  # Job 3: Adversarial E2E — anonymous denial + cross-tenant denial
  # CRITICA gate: A5 + A12, blocks merge
  # ---------------------------------------------------------------------------
  adversarial-gate:
    name: "CRITICA: Adversarial E2E Gate (A5+A12)"
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local instance
        run: supabase start

      - name: Apply migrations
        run: supabase db push

      - name: Capture local Supabase keys
        run: |
          ANON_KEY=$(supabase status --output json | jq -r '.anon_key')
          SERVICE_KEY=$(supabase status --output json | jq -r '.service_role_key')
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_KEY" >> $GITHUB_ENV

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Start Next.js server
        run: npm run start &
        env:
          PORT: 3000
          NEXT_TELEMETRY_DISABLED: 1

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: "GATE: Run adversarial Playwright tests"
        run: |
          npx playwright test \
            tests/e2e/adversarial-anonymous.spec.ts \
            tests/e2e/adversarial-cross-tenant.spec.ts \
            tests/e2e/adversarial-rls-bypass.spec.ts \
            tests/e2e/adversarial-log-redaction.spec.ts \
            --reporter=github
        # Exit code 1 on any failure → job fails → PR BLOCKED
        # This is intentional per A5+A12 CRITICA constitution rule.

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-adversarial-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop

  # ---------------------------------------------------------------------------
  # Job 4: Full E2E suite (non-adversarial) — informational, not blocking
  # ---------------------------------------------------------------------------
  e2e-full:
    name: E2E Full Suite
    runs-on: ubuntu-latest
    needs: [unit, adversarial-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase + apply migrations
        run: |
          supabase start
          supabase db push
          ANON_KEY=$(supabase status --output json | jq -r '.anon_key')
          SERVICE_KEY=$(supabase status --output json | jq -r '.service_role_key')
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_KEY" >> $GITHUB_ENV

      - name: Build + start Next.js
        run: |
          npm run build
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
        env:
          PORT: 3000
          NEXT_TELEMETRY_DISABLED: 1

      - name: Run full Playwright suite
        run: npx playwright test --reporter=github

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: supabase stop
